<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" rx="16" fill="url(#sky)"/>
  <circle cx="380" cy="64" r="36" fill="url(#sun)" opacity="0.95"/>
  <path d="M0 220 Q120 180 240 200 T480 210 V300 H0 Z" fill="#fef9c3" opacity="0.9"/>
  <path d="M0 240 Q160 210 320 230 T480 250 V300 H0 Z" fill="#fef08a" opacity="0.5"/>
  <!-- globe -->
  <circle cx="200" cy="130" r="72" stroke="#eab308" stroke-width="3" fill="#ffffff" opacity="0.95"/>
  <ellipse cx="200" cy="130" rx="72" ry="28" stroke="#fde047" stroke-width="1.5" fill="none"/>
  <path d="M128 130h144M200 58v144" stroke="#fde047" stroke-width="1.5"/>
  <path d="M140 100c20-8 40-8 60 0s40 8 60 0" stroke="#ca8a04" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- plane -->
  <path d="M320 118l-28 12l-8-8l12-4l24-8z" fill="#ca8a04"/>
  <path d="M320 118l-36 8l-4-6l32-8z" fill="#eab308"/>
  <circle cx="308" cy="124" r="3" fill="#ffffff"/>
  <!-- pin -->
  <path d="M360 200c0-24 16-32 32-32s32 8 32 32c0 28-32 52-32 52s-32-24-32-52z" fill="#eab308" stroke="#ca8a04" stroke-width="2"/>
  <circle cx="392" cy="196" r="10" fill="#ffffff"/>
  <!-- path -->
  <path d="M260 124 Q300 140 340 160" stroke="#fde047" stroke-width="3" stroke-dasharray="8 6" stroke-linecap="round"/>
